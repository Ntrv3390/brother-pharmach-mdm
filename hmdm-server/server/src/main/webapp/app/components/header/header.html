<!-- Localization completed -->
<nav class="navbar navbar-default navbar-fixed-top header">
  <div class="nav navbar-nav navbar-left logo-text">
    <a
      ng-click="mainPanel()"
      class="header-client-name-link"
      aria-label="Brothers Pharmamach India Pvt Ltd"
    >
      <span class="header-client-name">Brothers Pharmamach India Pvt Ltd</span>
    </a>
  </div>
  <ul class="nav navbar-nav navbar-right">
    <li ng-if="expiryWarning">
      <a
        id="headerExpiryWarning"
        class="expiry-warning"
        localized-change-tracking
        >Your account has expired!</a
      >
    </li>
    <li class="hide-on-small-screen">
      <a id="headerDateTime">{{dateTime}}</a>
    </li>
    <li class="dropdown margin-right" uib-dropdown>
      <a
        class="dropdown-toggle"
        uib-dropdown-toggle
        role="button"
        aria-expanded="false"
      >
        <!--                <span class='hide-on-small-screen username-tip' localized-change-tracking>Username</span> -->
        <span
          class="glyphicon glyphicon-user header-user-icon"
          aria-hidden="true"
        ></span>
        <span class="username-label">{{getUserName()}}</span>
        <span class="caret username-caret"></span>
      </a>
      <ul class="dropdown-menu" uib-dropdown-menu role="menu">
        <li>
          <a ng-style="color" ng-click="about()" localized-change-tracking
            >About</a
          >
        </li>
        <li>
          <a ui-sref="profile" ng-style="color" localized-change-tracking
            >Profile</a
          >
        </li>
        <!-- <li ng-if="updatesAllowed()"><a ui-sref='updates' ng-style='color' localized-change-tracking>Check for updates</a></li> -->
        <li ng-if="authService.isSuperAdmin() && !isControlPanel">
          <a ng-click="controlPanel()" localized-change-tracking
            >Master Panel</a
          >
        </li>
        <li ng-if="authService.isSuperAdmin() && isControlPanel">
          <a ng-click="mainPanel()" localized-change-tracking>Main panel</a>
        </li>
        <li><a ng-click="logout()" localized-change-tracking>Log out</a></li>
      </ul>
    </li>
  </ul>
</nav>
