<!-- Localization completed -->
<div ng-show='apps.length === 0' class='modal-header'>
    <div class='error'><span localized>Applications not found</span></div>
    <br/>
    <div class="center">
        <button type='button' class='btn btn-default' ng-click='closeModal()' localized>Close</button>
    </div>
</div>
<div class='modal-body' ng-if="apps.length > 0">

    <table class='table'>
        <thead>
        <tr>
            <th localized>Application Name</th>
            <th localized>Package ID</th>
            <th localized>Version</th>
        </tr>
        </thead>
        <tbody>
        <tr ng-repeat='app in apps'>
            <td>{{app.name}}</td>
            <td>{{app.pkg}}</td>
            <td>{{app.version}}</td>
        </tr>
        </tbody>
    </table>

    <div class="center">
        <button type='button' class='btn btn-default' ng-click='closeModal()' localized>Close</button>
    </div>
</div>
