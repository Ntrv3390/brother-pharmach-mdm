<!-- Localization completed -->
<div class="width-1000" ng-controller="SettingsTabController" ng-init="initCommonSettings()">
    <div class="text-center">
        <h4 localized>Visible columns in the "Devices" table</h4>
    </div>

    <div>
        <form class='form-horizontal'>
            <div class='form-group'>
                <div ng-show='errorMessage' class='error'><span>{{errorMessage}}</span></div>
                <div ng-show='successMessage' class='success'><span>{{successMessage}}</span></div>
            </div>

            <div class="form-group">
                <label class='col-sm-6 control-label' for="c1" localized>Users role</label>
                <div class='col-sm-6'>
                    <select class='form-control' ng-disabled="loading"
                            ng-model='formData.userRoleId'
                            ng-change="userRoleChanged()"
                            ng-options="role.id as role.name for role in userRoles">
                    </select>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c1" localized>Status</label>
                <div class='col-sm-1'>
                    <input id="c1" ng-model='userRoleSettings.columnDisplayedDeviceStatus' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c2" localized>Last online date</label>
                <div class='col-sm-1'>
                    <input id="c2" ng-model='userRoleSettings.columnDisplayedDeviceDate' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c3" localized>Device number</label>
                <div class='col-sm-1'>
                    <input id="c3" ng-model='userRoleSettings.columnDisplayedDeviceNumber' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c8" localized>IMEI</label>
                <div class='col-sm-1'>
                    <input id="c8" ng-model='userRoleSettings.columnDisplayedDeviceImei' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c9" localized>Phone Number</label>
                <div class='col-sm-1'>
                    <input id="c9" ng-model='userRoleSettings.columnDisplayedDevicePhone' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c4" localized>Phone Model</label>
                <div class='col-sm-1'>
                    <input id="c4" ng-model='userRoleSettings.columnDisplayedDeviceModel' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c5" localized>Permission Status</label>
                <div class='col-sm-1'>
                    <input id="c5" ng-model='userRoleSettings.columnDisplayedDevicePermissionsStatus' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c6" localized>Installation Status</label>
                <div class='col-sm-1'>
                    <input id="c6" ng-model='userRoleSettings.columnDisplayedDeviceAppInstallStatus' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c6-1" localized>Files Status</label>
                <div class='col-sm-1'>
                    <input id="c6-1" ng-model='userRoleSettings.columnDisplayedDeviceFilesStatus' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c7" localized>Configuration</label>
                <div class='col-sm-1'>
                    <input id="c7" ng-model='userRoleSettings.columnDisplayedDeviceConfiguration' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c10" localized>Description</label>
                <div class='col-sm-1'>
                    <input id="c10" ng-model='userRoleSettings.columnDisplayedDeviceDesc' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c11" localized>Group</label>
                <div class='col-sm-1'>
                    <input id="c11" ng-model='userRoleSettings.columnDisplayedDeviceGroup' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c112" localized>Launcher version</label>
                <div class='col-sm-1'>
                    <input id="c112" ng-model='userRoleSettings.columnDisplayedLauncherVersion' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c113" localized>Battery level</label>
                <div class='col-sm-1'>
                    <input id="c113" ng-model='userRoleSettings.columnDisplayedBatteryLevel' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c114" localized>MDM mode</label>
                <div class='col-sm-1'>
                    <input id="c114" ng-model='userRoleSettings.columnDisplayedMdmMode' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c121" localized>Kiosk mode</label>
                <div class='col-sm-1'>
                    <input id="c121" ng-model='userRoleSettings.columnDisplayedKioskMode' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c121" localized>Background mode</label>
                <div class='col-sm-1'>
                    <input id="c124" ng-model='userRoleSettings.columnDisplayedDefaultLauncher' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c118" localized>Android version</label>
                <div class='col-sm-1'>
                    <input id="c118" ng-model='userRoleSettings.columnDisplayedAndroidVersion' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c120" localized>Enrollment date</label>
                <div class='col-sm-1'>
                    <input id="c120" ng-model='userRoleSettings.columnDisplayedEnrollmentDate' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c122" localized>Serial number</label>
                <div class='col-sm-1'>
                    <input id="c122" ng-model='userRoleSettings.columnDisplayedSerial' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <label class='col-sm-6 control-label' for="c123" localized>IP address</label>
                <div class='col-sm-1'>
                    <input id="c123" ng-model='userRoleSettings.columnDisplayedPublicIp' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group' ng-if="settings.customPropertyName1">
                <label class='col-sm-6 control-label' for="c115">{{settings.customPropertyName1}}</label>
                <div class='col-sm-1'>
                    <input id="c115" ng-model='userRoleSettings.columnDisplayedCustom1' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group' ng-if="settings.customPropertyName2">
                <label class='col-sm-6 control-label' for="c116">{{settings.customPropertyName2}}</label>
                <div class='col-sm-1'>
                    <input id="c116" ng-model='userRoleSettings.columnDisplayedCustom2' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group' ng-if="settings.customPropertyName3">
                <label class='col-sm-6 control-label' for="c117">{{settings.customPropertyName3}}</label>
                <div class='col-sm-1'>
                    <input id="c117" ng-model='userRoleSettings.columnDisplayedCustom3' ng-disabled="loading"
                           type='checkbox' class='form-control'/>
                </div>
            </div>

            <div class='form-group'>
                <div class='col-sm-offset-6 col-sm-9 padding-left'>
                    <button type='submit' class='btn btn-default' ng-disabled="loading"
                            ng-click='saveCommonSettings()' localized>Save</button>
                </div>
            </div>
        </form>
    </div>
</div>
