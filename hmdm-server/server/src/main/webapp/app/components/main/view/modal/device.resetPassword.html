<div class="modal-header">
    <button type="button" class="close" ng-click="closeModal()" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
    <h4 class="modal-title" localized>Reset Password</h4>
</div>
<div class="modal-body">
    <form class="form-horizontal">
        <div class="form-group" ng-show="errorMessage">
            <div class="error"><span>{{errorMessage}}</span></div>
        </div>

        <div class="form-group">
            <div class="col-sm-12">
                <span localized>Enter new password for device </span> <strong>{{device.number}}</strong>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-12 margin-bottom">
                <input type="password" ng-model="password" class="form-control" localized-placeholder="New Password" />
            </div>
            <div class="col-sm-12 margin-bottom">
                <input type="password" ng-model="passwordConfirm" class="form-control" localized-placeholder="Confirm new password" />
            </div>
        </div>
    </form>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-default" ng-click="closeModal()" localized>Cancel</button>
    <button type="button" class="btn btn-default" ng-click="save()" localized>Save</button>
</div>
